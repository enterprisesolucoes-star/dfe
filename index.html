<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFe IA — Gestão Fiscal</title>
    <meta name="description" content="ERP fiscal com emissão de NFe, NFCe, Orçamentos e Ordens de Serviço" />
    <meta name="theme-color" content="#1a56db" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <script>
      // Dark mode imediato
      if(localStorage.getItem('dfe_dark_mode')==='true') document.documentElement.classList.add('dark');
      // Captura o evento de instalação PWA antes do React montar
      window._deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window._deferredInstallPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-installable'));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
